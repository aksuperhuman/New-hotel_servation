spring.datasource.url=jdbc:postgresql://localhost:5433/test_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redisson distributed lock connection (used by LockService for the
# room+dates booking hold, TTL is fixed at 5 minutes in LockService).
redisson.address=redis://127.0.0.1:6379

logging.level.org.springframework.boot.context.config=INFO
logging.level.com.hotel.hotel_system=DEBUG

# Change Spring Boot server port
server.port=8081
